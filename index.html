<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test de réflexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --card-bg:#E7E7E5;
    --card-border:#5c5c58;
    --btn-gray:#c7c7c4;
    --btn-gray-text:#6b6b67;
    --accent:#FFBA6B;
    --accent-dark:#e8a04f;
    --sky:#BFE3F5;
    --ink:#26261f;
    --nulle:#adadaa;
    --mauvaise:#e05252;
    --mediocre:#ef9d3c;
    --bonne:#8bc46a;
    --extra:#2f7d3c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:#ffffff;
    font-family:'Inter',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow-x:hidden;
  }
  h1,h2,.display{
    font-family:'Space Grotesk',sans-serif;
  }

  /* ---------- Carte centrale ---------- */
  .card{
    background:var(--card-bg);
    border:2px solid var(--card-border);
    border-radius:22px;
    width:520px;
    max-width:88vw;
    min-height:340px;
    padding:28px 32px 24px;
    position:relative;
    display:flex;
    flex-direction:column;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
  }
  .card h1{
    text-align:center;
    font-size:1.5rem;
    margin:0 0 22px;
    letter-spacing:0.01em;
  }

  /* ---------- Formulaire d'inscription ---------- */
  .field{
    margin-bottom:16px;
  }
  .field label{
    display:block;
    font-size:0.85rem;
    font-weight:600;
    margin-bottom:6px;
  }
  .field label .req{
    color:#d13b3b;
    margin-left:2px;
  }
  .field input, .field select{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1.5px solid #9b9b96;
    background:#fbfbfa;
    font-family:'Inter',sans-serif;
    font-size:0.95rem;
    color:var(--ink);
  }
  .field input:focus, .field select:focus{
    outline:2px solid var(--accent-dark);
    outline-offset:1px;
  }

  .start-row{
    margin-top:auto;
    display:flex;
    justify-content:flex-end;
    padding-top:10px;
  }
  #startBtn{
    border:none;
    border-radius:14px;
    padding:12px 26px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:not-allowed;
    background:var(--btn-gray);
    color:var(--btn-gray-text);
    transition:background .2s ease, color .2s ease, transform .1s ease;
  }
  #startBtn.enabled{
    background:var(--accent);
    color:#3a2408;
    cursor:pointer;
  }
  #startBtn.enabled:hover{
    background:var(--accent-dark);
  }
  #startBtn:active.enabled{
    transform:scale(0.97);
  }

  /* ---------- Questions logo ---------- */
  .quiz-progress{
    text-align:center;
    font-size:0.75rem;
    font-weight:600;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:#6b6b67;
    margin-bottom:14px;
  }
  .logo-square{
    width:150px;
    height:150px;
    margin:6px auto 18px;
    border-radius:12px;
    border:1.5px solid #4d4d49;
  }
  .question-text{
    text-align:center;
    font-weight:600;
    font-size:1.05rem;
    margin:0 0 20px;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
  }
  .opt-btn{
    width:78%;
    padding:12px 14px;
    border-radius:12px;
    border:1.5px solid #8f8f8a;
    background:var(--btn-gray);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    font-size:0.95rem;
    font-weight:600;
    cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .opt-btn:hover{ background:#b7b7b3; }
  .opt-btn:active{ transform:scale(0.98); }
  .opt-btn.correct{ background:var(--bonne); border-color:#3f7a2b; color:#153c0c; }
  .opt-btn.wrong{ background:var(--mauvaise); border-color:#9c2b2b; color:#4a0f0f; }
  .opt-btn.disabled{ pointer-events:none; opacity:0.85; }

  /* ---------- Questions couleur ---------- */
  .color-rect{
    width:220px;
    height:120px;
    margin:6px auto 20px;
    border-radius:12px;
    border:1.5px solid #4d4d49;
  }
  .color-pick-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-bottom:22px;
  }
  .color-pick-row input[type="color"]{
    width:64px;
    height:44px;
    border-radius:10px;
    border:1.5px solid #8f8f8a;
    background:none;
    cursor:pointer;
    padding:2px;
  }
  #validateColorBtn{
    border:none;
    border-radius:14px;
    padding:12px 22px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
    background:var(--accent);
    color:#3a2408;
  }
  #validateColorBtn:hover{ background:var(--accent-dark); }

  .feedback-flash{
    text-align:center;
    font-size:0.85rem;
    font-weight:600;
    min-height:1.2em;
    margin-top:10px;
    color:#4a7a3a;
  }

  /* ---------- Questions notes ---------- */
  .play-wrap{
    display:flex;
    justify-content:center;
    margin:10px auto 22px;
  }
  .play-btn{
    width:0;
    height:0;
    border-top:22px solid transparent;
    border-bottom:22px solid transparent;
    border-left:36px solid var(--btn-gray);
    cursor:pointer;
    transition:border-left-color .15s ease, transform .1s ease;
  }
  .play-btn:hover{ border-left-color:#b7b7b3; }
  .play-btn:active{ transform:scale(0.94); }

  .note-bands{
    display:flex;
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }
  .note-band{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:#8FC7EC;
    border:2px solid #1c1c18;
    border-radius:12px;
    padding:10px 14px;
  }
  .note-band .note-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    color:#0f2233;
    letter-spacing:0.02em;
  }
  .note-band .arrows{
    display:flex;
    gap:8px;
  }
  .note-band .arrows button{
    border:none;
    background:#ffffffaa;
    border-radius:8px;
    width:26px;
    height:26px;
    cursor:pointer;
    font-size:0.8rem;
    line-height:1;
    color:#0f2233;
  }
  .note-band .arrows button:hover{ background:#ffffff; }
  .note-band .arrows button:disabled{ opacity:0.3; cursor:default; }

  #validateOrderBtn{
    display:block;
    margin:0 auto;
    border:none;
    border-radius:14px;
    padding:12px 22px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.95rem;
    cursor:pointer;
    background:var(--accent);
    color:#3a2408;
  }
  #validateOrderBtn:hover{ background:var(--accent-dark); }

  /* ---------- Colonne Bilan (droite) ---------- */
  .bilan-column{
    position:fixed;
    top:0;
    bottom:0;
    right:36px;
    width:220px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:16px;
  }
  .bilan-panel{
    border:2px solid #1c1c18;
    border-radius:20px;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    max-height:320px;
  }
  .bilan-panel h2{
    text-align:center;
    font-size:1.05rem;
    margin:0;
    padding:16px 10px 12px;
    border-bottom:2px solid #1c1c18;
  }
  .bilan-list{
    overflow-y:auto;
    padding:12px 10px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .bilan-empty{
    font-size:0.8rem;
    color:#8a8a85;
    text-align:center;
    margin-top:20px;
    padding:0 8px 20px;
  }
  .bilan-item{
    position:relative;
    background:var(--sky);
    border-radius:12px;
    padding:14px 10px 10px;
    text-align:center;
    cursor:pointer;
    font-weight:700;
    font-family:'Space Grotesk',sans-serif;
    transition:transform .1s ease;
  }
  .bilan-item:hover{ transform:translateY(-2px); }
  .bilan-item .trash{
    position:absolute;
    top:6px;
    left:8px;
    cursor:pointer;
    font-size:0.9rem;
    line-height:1;
  }
  .bilan-item .sub{
    display:block;
    font-family:'Inter',sans-serif;
    font-weight:400;
    font-size:0.7rem;
    color:#2b4a5c;
    margin-top:4px;
    letter-spacing:0.05em;
  }

  /* ---------- Recherche par code ---------- */
  .bilan-search-box{
    border:2px solid #1c1c18;
    border-radius:20px;
    background:#ffffff;
    padding:14px 14px 16px;
  }
  .bilan-search-box label{
    display:block;
    font-size:0.78rem;
    font-weight:600;
    text-align:center;
    margin-bottom:10px;
    line-height:1.25;
  }
  .bilan-search-box input{
    width:100%;
    padding:9px 10px;
    border-radius:10px;
    border:1.5px solid #9b9b96;
    background:#fbfbfa;
    font-family:'Inter',sans-serif;
    font-size:0.9rem;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-bottom:10px;
  }
  .bilan-search-box input:focus{
    outline:2px solid var(--accent-dark);
    outline-offset:1px;
  }
  #findCodeBtn{
    width:100%;
    border:none;
    border-radius:12px;
    padding:9px 10px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    font-size:0.88rem;
    cursor:pointer;
    background:var(--accent);
    color:#3a2408;
  }
  #findCodeBtn:hover{ background:var(--accent-dark); }
  .code-msg{
    text-align:center;
    font-size:0.78rem;
    font-weight:600;
    margin:10px 0 0;
    min-height:1.1em;
  }
  .code-msg.error{ color:#c0342c; }
  .code-msg.info{ color:#3a6ea5; }
  .code-msg.success{ color:#3f7a2b; }

  /* ---------- Verrou de maintenance ---------- */
  .card-wrap{ position:relative; }
  .bilan-search-box{ position:relative; }
  .locked-overlay{
    position:absolute;
    inset:0;
    border-radius:inherit;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    background:rgba(231,231,229,0.6);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:6;
  }
  .lock-icon{ position:relative; width:44px; height:52px; }
  .lock-icon .shackle{
    position:absolute; top:0; left:8px;
    width:28px; height:24px;
    border:6px solid #c0342c;
    border-bottom:none;
    border-radius:15px 15px 0 0;
    box-sizing:border-box;
  }
  .lock-icon .body{
    position:absolute; bottom:0; left:0;
    width:44px; height:29px;
    background:#c0342c;
    border-radius:7px;
  }
  .lock-icon .hole{
    position:absolute; top:8px; left:50%;
    transform:translateX(-50%);
    width:7px; height:7px;
    background:#fdf1f0;
    border-radius:50%;
  }
  .lock-icon .hole::after{
    content:'';
    position:absolute; top:5px; left:50%;
    transform:translateX(-50%);
    width:3px; height:7px;
    background:#fdf1f0;
  }
  .lock-tooltip{
    position:absolute;
    bottom:105%; left:50%;
    transform:translateX(-50%);
    background:#2a1414;
    color:#fff;
    padding:10px 14px;
    border-radius:10px;
    font-size:0.76rem;
    font-weight:600;
    width:210px;
    text-align:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .15s ease;
    z-index:10;
  }
  .lock-tooltip::after{
    content:'';
    position:absolute; top:100%; left:50%;
    transform:translateX(-50%);
    border:6px solid transparent;
    border-top-color:#2a1414;
  }
  .lock-tooltip.show{ opacity:1; }

  #maintenanceBanner{
    position:fixed;
    top:0; left:0; right:0;
    background:#c0342c;
    color:#fff;
    text-align:center;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:1.15rem;
    padding:16px 12px;
    letter-spacing:0.01em;
    z-index:20;
  }

  /* ---------- Overlay recap A4 ---------- */
  .overlay{
    position:fixed; inset:0;
    background:rgba(20,20,18,0.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    padding:20px;
  }
  .overlay.show{ display:flex; }
  .sheet{
    background:#fff;
    width:100%;
    max-width:520px;
    max-height:88vh;
    overflow-y:auto;
    border-radius:10px;
    padding:34px 36px;
    position:relative;
    box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .sheet .close-x{
    position:absolute;
    top:14px; right:16px;
    cursor:pointer;
    font-size:1.1rem;
    color:#666;
  }
  .sheet h2{
    text-align:center;
    font-size:1.3rem;
    margin-bottom:4px;
  }
  .sheet .subtitle{
    text-align:center;
    font-size:0.8rem;
    color:#8a8a85;
    margin-bottom:22px;
  }
  .info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px 18px;
    font-size:0.9rem;
    margin-bottom:26px;
    padding-bottom:20px;
    border-bottom:1px solid #e2e2df;
  }
  .info-grid .label{
    font-size:0.7rem;
    text-transform:uppercase;
    letter-spacing:0.05em;
    color:#8a8a85;
    display:block;
  }
  .result-block{ margin-bottom:20px; }
  .result-block h3{
    font-size:0.95rem;
    margin:0 0 10px;
  }
  .badge{
    display:inline-block;
    padding:8px 18px;
    border-radius:12px;
    font-weight:700;
    font-family:'Space Grotesk',sans-serif;
    color:#fff;
    font-size:0.95rem;
  }
  .badge.nulle{ background:var(--nulle); color:#3a3a37; }
  .badge.mauvaise{ background:var(--mauvaise); }
  .badge.mediocre{ background:var(--mediocre); }
  .badge.bonne{ background:var(--bonne); color:#153c0c; }
  .badge.extra{ background:var(--extra); }

  #downloadPdfBtn{
    display:block;
    margin:8px auto 0;
    border:none;
    border-radius:14px;
    padding:11px 22px;
    font-family:'Space Grotesk',sans-serif;
    font-weight:600;
    cursor:pointer;
    background:var(--accent);
    color:#3a2408;
  }
  #downloadPdfBtn:hover{ background:var(--accent-dark); }

  @media (max-width:760px){
    .bilan-column{ position:static; width:88vw; max-width:520px; margin-top:24px; order:2; }
    .bilan-panel{ max-height:220px; }
    body{ flex-direction:column; padding:24px 0; }
    .card{ order:1; }
  }
</style>
</head>
<body>

  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card"></div>
  </div>

  <div class="bilan-column">
    <aside class="bilan-panel">
      <h2>Bilan</h2>
      <div class="bilan-list" id="bilanList"></div>
    </aside>
    <div class="bilan-search-box">
      <label for="codeInput">Trouver mon bilan avec mon code bilan</label>
      <input type="text" id="codeInput" placeholder="Ex : 7K2P9X" maxlength="10">
      <button id="findCodeBtn">Rechercher</button>
      <p class="code-msg" id="codeMsg"></p>
    </div>
  </div>

  <div class="overlay" id="overlay">
    <div class="sheet" id="sheet"></div>
  </div>

<script>
/* ===================== Données du test ===================== */
const LOGO_QUESTIONS = [
  { gradient: "linear-gradient(to right, #e53935 0%, #e53935 33.33%, #fdd835 33.33%, #fdd835 66.66%, #1e5fbf 66.66%, #1e5fbf 100%)",
    options: ["Aldi", "Lidl", "Ikea"], answer: "Lidl" },
  { gradient: "linear-gradient(to right, #d81f26 0%, #d81f26 50%, #141414 50%, #141414 100%)",
    options: ["Prime Video", "Disney+", "Netflix"], answer: "Netflix" },
  { gradient: "linear-gradient(to right, #f4d20c 0%, #f4d20c 50%, #367c2b 50%, #367c2b 100%)",
    options: ["John Deere", "Schneider", "Rizer"], answer: "John Deere" },
  { gradient: "linear-gradient(to right, #6f4225 0%, #6f4225 25%, #ffffff 25%, #ffffff 50%, #d62300 50%, #d62300 75%, #003087 75%, #003087 100%)",
    options: ["McDonald's", "Burger King", "O'Tacos"], answer: "Burger King" }
];

const NUM_COLOR_QUESTIONS = 4;

const NOTES = {
  'Do':  261.63,
  'Ré':  293.66,
  'Mi':  329.63,
  'Fa':  349.23,
  'Sol': 392.00,
  'La':  440.00,
  'Si':  493.88
};
const NOTE_NAMES = Object.keys(NOTES);
const NUM_NOTE_SINGLE_QUESTIONS = 2;
const NUM_NOTE_SEQUENCE_QUESTIONS = 2;
const TOTAL_QUESTIONS = LOGO_QUESTIONS.length + NUM_COLOR_QUESTIONS + NUM_NOTE_SINGLE_QUESTIONS + NUM_NOTE_SEQUENCE_QUESTIONS;

let audioCtx = null;
function playTone(freq, duration = 0.55){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = freq;
  const now = audioCtx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.28, now + 0.03);
  gain.gain.linearRampToValueAtTime(0, now + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + duration + 0.02);
}
function playSequence(noteNames, gap = 0.65){
  noteNames.forEach((n, i) => {
    setTimeout(() => playTone(NOTES[n]), i * gap * 1000);
  });
}
function shuffle(arr){
  const a = arr.slice();
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ===================== Supabase ===================== */
const SUPABASE_URL = 'https://alrcdwhyrgqqrfyxqklg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_AXSZBIjcBZbAVosgFccfYQ_dUVhaXa0';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const CODE_CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; // sans O/0, I/1 pour éviter la confusion
function generateCode(len = 6){
  let code = '';
  for(let i = 0; i < len; i++){
    code += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
  }
  return code;
}
function mapRowToBilan(row){
  return {
    code: row.code,
    nom: row.nom,
    prenom: row.prenom,
    date: row.date_naissance,
    genre: row.genre,
    logoScore: row.logo_score,
    colorScore: row.color_score,
    noteScore: row.note_score,
    createdAt: row.created_at
  };
}

/* ===================== État ===================== */
let participant = {};
let step = 0; // 0 = inscription, 1-4 logos, 5-8 couleurs, 9-10 notes, 11-12 mélodies
let logoCorrectCount = 0;
let colorScores = [];
let noteCorrectCount = 0;
let currentRandomColor = null;

const card = document.getElementById('card');
const bilanList = document.getElementById('bilanList');
const overlay = document.getElementById('overlay');
const sheet = document.getElementById('sheet');

/* ===================== Rendu inscription ===================== */
function renderRegistration(){
  step = 0;
  card.innerHTML = `
    <h1>Test de réflexion</h1>
    <div class="field">
      <label>Nom<span class="req">*</span></label>
      <input type="text" id="fNom" autocomplete="off">
    </div>
    <div class="field">
      <label>Prénom<span class="req">*</span></label>
      <input type="text" id="fPrenom" autocomplete="off">
    </div>
    <div class="field">
      <label>Date de naissance<span class="req">*</span></label>
      <input type="date" id="fDate">
    </div>
    <div class="field">
      <label>Genre<span class="req">*</span></label>
      <select id="fGenre">
        <option value="" disabled selected>Choisir…</option>
        <option value="Femme">Femme</option>
        <option value="Homme">Homme</option>
        <option value="Autre">Autre</option>
      </select>
    </div>
    <div class="start-row">
      <button id="startBtn" disabled>Commencer le test</button>
    </div>
  `;

  const inputs = ['fNom','fPrenom','fDate','fGenre'].map(id => document.getElementById(id));
  const startBtn = document.getElementById('startBtn');

  function checkComplete(){
    const ok = inputs.every(i => i.value.trim() !== '');
    startBtn.disabled = !ok;
    startBtn.classList.toggle('enabled', ok);
  }
  inputs.forEach(i => i.addEventListener('input', checkComplete));
  inputs.forEach(i => i.addEventListener('change', checkComplete));

  startBtn.addEventListener('click', () => {
    if(startBtn.disabled) return;
    participant = {
      nom: document.getElementById('fNom').value.trim(),
      prenom: document.getElementById('fPrenom').value.trim(),
      date: document.getElementById('fDate').value,
      genre: document.getElementById('fGenre').value
    };
    logoCorrectCount = 0;
    colorScores = [];
    noteCorrectCount = 0;
    step = 1;
    renderLogoQuestion(0);
  });
}

/* ===================== Questions logo (1-4) ===================== */
function renderLogoQuestion(index){
  const q = LOGO_QUESTIONS[index];
  card.innerHTML = `
    <div class="quiz-progress">Question ${index+1} / ${TOTAL_QUESTIONS}</div>
    <div class="logo-square" style="background:${q.gradient}"></div>
    <p class="question-text">Choisis le nom du logo</p>
    <div class="options">
      ${q.options.map((opt,i) => `<button class="opt-btn" data-opt="${i}">${opt}</button>`).join('')}
    </div>
    <p class="feedback-flash" id="feedback"></p>
  `;
  const buttons = card.querySelectorAll('.opt-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.add('disabled'));
      const chosen = q.options[btn.dataset.opt];
      const correct = chosen === q.answer;
      if(correct){
        logoCorrectCount++;
        btn.classList.add('correct');
        document.getElementById('feedback').textContent = 'Bonne réponse !';
      } else {
        btn.classList.add('wrong');
        buttons.forEach(b => { if(b.textContent === q.answer) b.classList.add('correct'); });
        document.getElementById('feedback').textContent = 'Pas tout à fait…';
      }
      setTimeout(() => {
        if(index + 1 < LOGO_QUESTIONS.length){
          renderLogoQuestion(index + 1);
        } else {
          renderColorQuestion(0);
        }
      }, 700);
    });
  });
}

/* ===================== Questions couleur (5-8) ===================== */
function randomColor(){
  const r = Math.floor(Math.random()*256);
  const g = Math.floor(Math.random()*256);
  const b = Math.floor(Math.random()*256);
  return {r,g,b, hex: rgbToHex(r,g,b)};
}
function rgbToHex(r,g,b){
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}
function hexToRgb(hex){
  const m = hex.replace('#','');
  return {
    r: parseInt(m.substring(0,2),16),
    g: parseInt(m.substring(2,4),16),
    b: parseInt(m.substring(4,6),16)
  };
}
function colorCloseness(c1, c2){
  const dist = Math.sqrt((c1.r-c2.r)**2 + (c1.g-c2.g)**2 + (c1.b-c2.b)**2);
  const maxDist = Math.sqrt(255**2 * 3);
  return Math.max(0, 100 * (1 - dist / maxDist));
}

function renderColorQuestion(index){
  currentRandomColor = randomColor();
  card.innerHTML = `
    <div class="quiz-progress">Question ${index+5} / ${TOTAL_QUESTIONS}</div>
    <div class="color-rect" style="background:${currentRandomColor.hex}"></div>
    <p class="question-text">Trouve la bonne couleur</p>
    <div class="color-pick-row">
      <input type="color" id="colorInput" value="#808080">
      <button id="validateColorBtn">Valider</button>
    </div>
    <p class="feedback-flash" id="feedback"></p>
  `;
  document.getElementById('validateColorBtn').addEventListener('click', () => {
    const picked = hexToRgb(document.getElementById('colorInput').value);
    const score = colorCloseness(currentRandomColor, picked);
    colorScores.push(score);
    document.getElementById('feedback').textContent = `Proximité : ${score.toFixed(0)}%`;
    document.getElementById('validateColorBtn').disabled = true;
    document.getElementById('colorInput').disabled = true;
    setTimeout(() => {
      if(index + 1 < NUM_COLOR_QUESTIONS){
        renderColorQuestion(index + 1);
      } else {
        renderNoteSingleQuestion(0);
      }
    }, 700);
  });
}

/* ===================== Questions notes simples (9-10) ===================== */
function renderNoteSingleQuestion(index){
  const target = NOTE_NAMES[Math.floor(Math.random() * NOTE_NAMES.length)];
  const distractors = shuffle(NOTE_NAMES.filter(n => n !== target)).slice(0, 2);
  const options = shuffle([target, ...distractors]);

  card.innerHTML = `
    <div class="quiz-progress">Question ${LOGO_QUESTIONS.length + NUM_COLOR_QUESTIONS + index + 1} / ${TOTAL_QUESTIONS}</div>
    <div class="play-wrap"><div class="play-btn" id="playBtn" role="button" aria-label="Écouter la note"></div></div>
    <p class="question-text">Quelle note viens-tu d'entendre ?</p>
    <div class="options">
      ${options.map((opt,i) => `<button class="opt-btn" data-opt="${i}">${opt}</button>`).join('')}
    </div>
    <p class="feedback-flash" id="feedback"></p>
  `;

  document.getElementById('playBtn').addEventListener('click', () => playTone(NOTES[target]));

  const buttons = card.querySelectorAll('.opt-btn');
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.add('disabled'));
      const chosen = options[btn.dataset.opt];
      const correct = chosen === target;
      if(correct){
        noteCorrectCount++;
        btn.classList.add('correct');
        document.getElementById('feedback').textContent = 'Bonne réponse !';
      } else {
        btn.classList.add('wrong');
        buttons.forEach(b => { if(b.textContent === target) b.classList.add('correct'); });
        document.getElementById('feedback').textContent = 'Pas tout à fait…';
      }
      setTimeout(() => {
        if(index + 1 < NUM_NOTE_SINGLE_QUESTIONS){
          renderNoteSingleQuestion(index + 1);
        } else {
          renderNoteSequenceQuestion(0);
        }
      }, 700);
    });
  });
}

/* ===================== Questions mélodie (11-12) ===================== */
function renderNoteSequenceQuestion(index){
  const targetSequence = shuffle(NOTE_NAMES).slice(0, 4);
  let bandOrder = shuffle(targetSequence);
  while(bandOrder.join() === targetSequence.join()){
    bandOrder = shuffle(targetSequence);
  }

  function draw(){
    card.innerHTML = `
      <div class="quiz-progress">Question ${LOGO_QUESTIONS.length + NUM_COLOR_QUESTIONS + NUM_NOTE_SINGLE_QUESTIONS + index + 1} / ${TOTAL_QUESTIONS}</div>
      <div class="play-wrap"><div class="play-btn" id="playBtn" role="button" aria-label="Écouter la mélodie"></div></div>
      <p class="question-text">Remets les notes dans le bon ordre</p>
      <div class="note-bands" id="bandsWrap">
        ${bandOrder.map((n,i) => `
          <div class="note-band" data-note="${n}">
            <span class="note-name">${n}</span>
            <span class="arrows">
              <button data-dir="up" data-idx="${i}" ${i===0 ? 'disabled' : ''}>▲</button>
              <button data-dir="down" data-idx="${i}" ${i===bandOrder.length-1 ? 'disabled' : ''}>▼</button>
            </span>
          </div>
        `).join('')}
      </div>
      <button id="validateOrderBtn">Valider</button>
      <p class="feedback-flash" id="feedback"></p>
    `;
    document.getElementById('playBtn').addEventListener('click', () => playSequence(targetSequence));
    card.querySelectorAll('.arrows button').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.idx, 10);
        const j = btn.dataset.dir === 'up' ? i - 1 : i + 1;
        [bandOrder[i], bandOrder[j]] = [bandOrder[j], bandOrder[i]];
        draw();
      });
    });
    document.getElementById('validateOrderBtn').addEventListener('click', () => {
      const correct = bandOrder.join() === targetSequence.join();
      if(correct){
        noteCorrectCount++;
        document.getElementById('feedback').textContent = 'Bon ordre !';
      } else {
        document.getElementById('feedback').textContent = `Pas tout à fait… l'ordre était : ${targetSequence.join(' - ')}`;
      }
      document.getElementById('validateOrderBtn').disabled = true;
      card.querySelectorAll('.arrows button').forEach(b => b.disabled = true);
      setTimeout(() => {
        if(index + 1 < NUM_NOTE_SEQUENCE_QUESTIONS){
          renderNoteSequenceQuestion(index + 1);
        } else {
          finishTest();
        }
      }, 1400);
    });
  }
  draw();
}

/* ===================== Fin du test / bilan ===================== */
async function finishTest(){
  const avgColor = colorScores.reduce((a,b)=>a+b,0) / colorScores.length;
  const code = generateCode();
  const bilan = {
    code,
    nom: participant.nom,
    prenom: participant.prenom,
    date: participant.date,
    genre: participant.genre,
    logoScore: logoCorrectCount,
    colorScore: avgColor,
    noteScore: noteCorrectCount,
    createdAt: new Date().toISOString()
  };

  let saveError = false;
  let saveErrorDetail = '';
  try{
    const { error } = await sb.from('bilans').insert([{
      code: bilan.code,
      nom: bilan.nom,
      prenom: bilan.prenom,
      date_naissance: bilan.date || null,
      genre: bilan.genre,
      logo_score: bilan.logoScore,
      color_score: bilan.colorScore,
      note_score: bilan.noteScore
    }]);
    if(error){
      saveError = true;
      saveErrorDetail = error.message || JSON.stringify(error);
      console.error(error);
    }
  } catch(e){
    saveError = true;
    saveErrorDetail = e.message || String(e);
    console.error(e);
  }

  addLocalBilan(bilan);
  renderRegistration();
  renderBilanList();
  showCodeModal(bilan, saveError, saveErrorDetail);
}

/* ===================== Cache local des bilans consultés sur cet appareil ===================== */
const STORAGE_KEY = 'reflexion_bilans_cache';

function loadLocalBilans(){
  try{
    return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  } catch(e){ return []; }
}
function saveLocalBilans(list){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}
function addLocalBilan(bilan){
  const list = loadLocalBilans().filter(b => b.code !== bilan.code);
  list.unshift(bilan);
  saveLocalBilans(list);
}
function removeLocalBilan(code){
  const list = loadLocalBilans().filter(b => b.code !== code);
  saveLocalBilans(list);
  renderBilanList();
}

/* ===================== Recherche d'un bilan par code ===================== */
async function handleFindCode(){
  const input = document.getElementById('codeInput');
  const msg = document.getElementById('codeMsg');
  const code = input.value.trim().toUpperCase();
  msg.className = 'code-msg';
  msg.textContent = '';
  if(!code) return;

  if(loadLocalBilans().some(b => b.code === code)){
    msg.textContent = 'Vous avez déjà votre bilan.';
    msg.classList.add('info');
    return;
  }

  msg.textContent = 'Recherche…';
  try{
    const { data, error } = await sb.from('bilans').select('*').eq('code', code).maybeSingle();
    if(error){
      msg.textContent = 'Erreur : ' + (error.message || 'inconnue');
      msg.classList.add('error');
      console.error(error);
      return;
    }
    if(!data){
      msg.textContent = 'Code introuvable';
      msg.classList.add('error');
      return;
    }
    const bilan = mapRowToBilan(data);
    addLocalBilan(bilan);
    renderBilanList();
    msg.textContent = 'Bilan retrouvé !';
    msg.classList.add('success');
    input.value = '';
  } catch(e){
    msg.textContent = 'Erreur de connexion, réessaie.';
    msg.classList.add('error');
  }
}
document.getElementById('findCodeBtn').addEventListener('click', handleFindCode);
document.getElementById('codeInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') handleFindCode();
});

/* ===================== Modale : code bilan à conserver ===================== */
function showCodeModal(bilan, saveError, saveErrorDetail){
  sheet.innerHTML = `
    <span class="close-x" id="closeSheet">✕</span>
    <h2>Bilan enregistré</h2>
    <p class="subtitle">Merci ${escapeHtml(bilan.prenom)} !</p>
    <p style="text-align:center;font-size:0.92rem;margin-bottom:14px;">
      Ton code bilan (à conserver pour le retrouver depuis un autre appareil) :
    </p>
    <p style="text-align:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.7rem;letter-spacing:0.18em;background:#f2f2ef;border-radius:12px;padding:16px;margin-bottom:${saveError ? '14px' : '0'};">
      ${bilan.code}
    </p>
    ${saveError ? `<p style="text-align:center;font-size:0.8rem;color:#c0342c;">La sauvegarde en ligne a échoué : ${escapeHtml(saveErrorDetail || 'raison inconnue')}</p>` : ''}
  `;
  overlay.classList.add('show');
  document.getElementById('closeSheet').addEventListener('click', () => overlay.classList.remove('show'));
}

/* ===================== Rendu du panneau bilan ===================== */
function renderBilanList(){
  const list = loadLocalBilans();
  if(list.length === 0){
    bilanList.innerHTML = `<p class="bilan-empty">Les résultats du test apparaîtront ici.</p>`;
    return;
  }
  bilanList.innerHTML = list.map(b => `
    <div class="bilan-item" data-code="${b.code}">
      <span class="trash" data-del="${b.code}" title="Supprimer">🗑</span>
      ${escapeHtml(b.prenom)}
      <span class="sub">${escapeHtml(b.code)}</span>
    </div>
  `).join('');

  bilanList.querySelectorAll('.trash').forEach(t => {
    t.addEventListener('click', (e) => {
      e.stopPropagation();
      removeLocalBilan(t.dataset.del);
    });
  });
  bilanList.querySelectorAll('.bilan-item').forEach(item => {
    item.addEventListener('click', () => {
      const b = loadLocalBilans().find(x => x.code === item.dataset.code);
      if(b) openSheet(b);
    });
  });
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
function formatDate(iso){
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function calcAge(iso){
  if(!iso) return '';
  const birth = new Date(iso);
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  const mDiff = now.getMonth() - birth.getMonth();
  if(mDiff < 0 || (mDiff === 0 && now.getDate() < birth.getDate())) age--;
  return age;
}

/* ===================== Récapitulatif A4 ===================== */
function logoBadge(score){
  if(score === 0) return {label:'Nulle', cls:'nulle'};
  if(score === 1) return {label:'Mauvaise', cls:'mauvaise'};
  if(score === 2) return {label:'Médiocre', cls:'mediocre'};
  if(score === 3) return {label:'Bonne', cls:'bonne'};
  return {label:'Extra', cls:'extra'};
}
function colorBadge(pct){
  if(pct < 25) return {label:'Mauvaise', cls:'mauvaise'};
  if(pct < 50) return {label:'Médiocre', cls:'mediocre'};
  if(pct < 75) return {label:'Bonne', cls:'bonne'};
  return {label:'Extra', cls:'extra'};
}

function openSheet(b){
  const lb = logoBadge(b.logoScore);
  const cb = colorBadge(b.colorScore);
  const nb = typeof b.noteScore === 'number' ? logoBadge(b.noteScore) : null;
  sheet.innerHTML = `
    <span class="close-x" id="closeSheet">✕</span>
    <h2>Récapitulatif</h2>
    <p class="subtitle">Test de réflexion</p>
    <div class="info-grid">
      <div><span class="label">Nom</span>${escapeHtml(b.nom)}</div>
      <div><span class="label">Prénom</span>${escapeHtml(b.prenom)}</div>
      <div><span class="label">Date de naissance</span>${b.date ? formatDate(b.date) + ' (' + calcAge(b.date) + ' ans)' : '—'}</div>
      <div><span class="label">Genre</span>${escapeHtml(b.genre)}</div>
      <div><span class="label">Code bilan</span>${escapeHtml(b.code)}</div>
    </div>
    <div class="result-block">
      <h3>Connaissance en logos (moyenne)</h3>
      <span class="badge ${lb.cls}">${lb.label}</span>
    </div>
    <div class="result-block">
      <h3>Perception des couleurs (moyenne)</h3>
      <span class="badge ${cb.cls}">${cb.label}</span>
    </div>
    ${nb ? `
    <div class="result-block">
      <h3>Capacité à reconnaître les notes</h3>
      <span class="badge ${nb.cls}">${nb.label}</span>
    </div>` : ''}
    <button id="downloadPdfBtn">Télécharger en PDF</button>
  `;
  overlay.classList.add('show');
  document.getElementById('closeSheet').addEventListener('click', () => overlay.classList.remove('show'));
  document.getElementById('downloadPdfBtn').addEventListener('click', () => {
    const dlBtn = document.getElementById('downloadPdfBtn');
    const closeX = document.getElementById('closeSheet');
    dlBtn.style.display = 'none';
    closeX.style.display = 'none';
    html2pdf().set({
      margin: 10,
      filename: `bilan_${b.prenom}_${b.nom}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    }).from(sheet).save().then(() => {
      dlBtn.style.display = 'block';
      closeX.style.display = 'block';
    });
  });
}

overlay.addEventListener('click', (e) => {
  if(e.target === overlay) overlay.classList.remove('show');
});

/* ===================== Verrou de maintenance ===================== */
function lockOverlayHTML(id, msg){
  return `<div class="locked-overlay" id="${id}">
    <div class="lock-icon"><div class="shackle"></div><div class="body"><div class="hole"></div></div></div>
    <div class="lock-tooltip" id="${id}Tip">${msg}</div>
  </div>`;
}
function wireLock(id, msg, container){
  container.insertAdjacentHTML('beforeend', lockOverlayHTML(id, msg));
  document.getElementById(id).addEventListener('click', () => {
    const tip = document.getElementById(id + 'Tip');
    tip.classList.add('show');
    setTimeout(() => tip.classList.remove('show'), 2500);
  });
}
async function checkMaintenance(){
  try{
    const { data, error } = await sb.from('settings').select('maintenance').eq('id', 1).maybeSingle();
    if(error || !data || !data.maintenance) return;
    wireLock('lockCard', 'Test indisponible pour le moment, veuillez patienter.', document.getElementById('cardWrap'));
    const banner = document.createElement('div');
    banner.id = 'maintenanceBanner';
    banner.textContent = 'Test non accessible pour le moment';
    document.body.prepend(banner);
    document.body.style.paddingTop = '64px';
  } catch(e){
    console.error(e);
  }
}

/* ===================== Init ===================== */
renderRegistration();
renderBilanList();
checkMaintenance();
</script>
